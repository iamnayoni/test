<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueCode Studio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", sans-serif;
    color:#111;
    background:#fff;
    line-height:1.6;
}

header{
    padding:20px 10%;
    border-bottom:1px solid #eee;
}

.logo{
    font-size:24px;
    font-weight:700;
    color:#1428A0;
}

.hero{
    text-align:center;
    padding:120px 20px;
}

.hero h1{
    font-size:48px;
    margin-bottom:20px;
}

.hero p{
    max-width:700px;
    margin:0 auto 40px;
    color:#666;
    font-size:18px;
}

.btn{
    display:inline-block;
    padding:14px 32px;
    background:#1428A0;
    color:#fff;
    text-decoration:none;
    border-radius:6px;
    font-weight:600;
}

.services{
    padding:80px 10%;
    background:#f8f9fb;
}

.services h2{
    text-align:center;
    margin-bottom:40px;
}

.cards{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    background:#fff;
    padding:30px;
    width:280px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.card h3{
    margin-bottom:10px;
    color:#1428A0;
}

footer{
    text-align:center;
    padding:40px 20px;
    color:#777;
}
</style>
</head>

<body>

<header>
    <div class="logo">BlueCode Studio</div>
</header>

<section class="hero">
    <h1>신뢰할 수 있는<br>소프트웨어를 만듭니다.</h1>
    <p>
        1인 스타트업으로 웹 개발, 업무 자동화,
        맞춤형 소프트웨어 구축을 제공합니다.
    </p>
    <a href="mailto:contact@example.com" class="btn">문의하기</a>
</section>

<section class="services">
    <h2>서비스</h2>

    <div class="cards">
        <div class="card">
            <h3>웹 개발</h3>
            <p>반응형 웹사이트 및 웹 서비스 제작</p>
        </div>

        <div class="card">
            <h3>자동화</h3>
            <p>반복 업무를 자동화하여 생산성 향상</p>
        </div>

        <div class="card">
            <h3>유지보수</h3>
            <p>안정적인 운영과 지속적인 개선 지원</p>
        </div>
    </div>
</section>

<footer>
    © 2026 BlueCode Studio. All Rights Reserved.
</footer>

</body>
</html>
